# Code reference: https://github.com/nicolastakashi/prom-analytics-proxy/blob/main/internal/config/config.go

# Server
server:
  insecure_listen_address: ":9091" # The address the prom-analytics-proxy proxy HTTP server should listen on. (default ":9091")
  push_metrics_usage_timeout: time.Duration # Timeout for PushMetricsUsage API endpoint. (default 30s)

upstream:
  url: "http://prometheus.monitoring.svc.cluster.local:9090" # The URL of the upstream Prometheus API.
  include_query_stats: true # Request query stats from the upstream prometheus API. (default true)

memory_limit:
  enabled: true # Enable automatic GOMEMLIMIT management via automemlimit (default false)
  ratio: 0.9 # Ratio (0 < ratio <= 1) of detected memory limit used for GOMEMLIMIT (default 0.9)
  refresh_interval: 1m # Interval for refreshing the computed memory limit (0 disables refresh) (default 1m0s)

metadata_limit: 0 # The maximum number of metric metadata entries to retrieve from the upstream prometheus API. (default 0 which means no limit)
series_limit: 0 # The maximum number of series to retrieve from the upstream prometheus API. (default 0 which means no limit)

# Database
database:
  provider: "postgresql" # The provider of database to use for storing query data. Supported values: postgresql, sqlite.
  # SQLite (suitable for development)
  sqlite:
    database_path: "/etc/opt/data/prom-analytics-proxy.db" # Path to the sqlite database. (default "prom-analytics-proxy.db")
  # PostgreSQL (suitable for production)
  postgresql:
    addr: "localhost" # Address of the postgresql server. (default "localhost")
    port: 5432 # Port of the postgresql server. (default 5432)
    database: "postgres" # Database for the postgresql server, can also be set via POSTGRESQL_DATABASE env var.
    user: "postgres" # Username for the postgresql server, can also be set via POSTGRESQL_USER env var.
    password: "postgres" # Password for the postgresql server, can also be set via POSTGRESQL_PASSWORD env var.
    sslmode: "disable" # SSL mode for the postgresql server. (default "disable")
    max_open_conns: int # Maximum number of open connections to the database (0 = use default 20).
    max_idle_conns: int # Maximum number of idle connections in the pool (0 = use default 10).
    conn_max_lifetime: time.Duration # Maximum amount of time a connection may be reused (0 = use default 30m).
    conn_max_idle_time: time.Duration # Maximum amount of time a connection may be idle before being closed (0 = use default 5m).
    dial_timeout: time.Duration # Timeout to dial postgresql. (default 5s)

# Performance tuning
insert:
  batch_size: 10 # Batch size for inserting queries into the database. (default 10)
  buffer_size: 100 # Buffer size for the insert channel. (default 100)
  flush_interval: "5s" # Flush interval for inserting queries into the database. (default 5s)
  grace_period: "5s" # Grace period to insert pending queries after program shutdown. (default 5s)
  timeout: "1s" # Timeout to insert a query into the database. (default 1s)

# Retention
retention:
  enabled: true # Enable the retention worker to delete old data (default false)
  interval: 72h # 3d / Interval between retention runs (default 1h0m0s)
  queries_max_age: 4320h # 180d / Maximum age for queries before deletion (default 720h0m0s / 30d)
  run_timeou: 30m # Timeout for each retention run (default 5m0s)

# Inventory
# The inventory syncer maintains a catalog of metrics and their usage patterns. 
# It uses concurrent processing to handle large numbers of jobs efficiently.
inventory:
  enabled: true # Enable inventory syncing (default: true)
  sync_interval: 10m # How often to sync inventory (default: 10m)
  time_window: 720h # Time window for usage analysis (default: 720h0m0s / 30d)
  run_timeout: 30s # Timeout for entire sync run (default: 30s)
  metadata_step_timeout: 15s # Timeout for metadata fetch (default: 15s)
  summary_step_timeout: 10s # Timeout for usage summary refresh (default: 10s)
  job_index_label_timeout: 10s # Timeout for job label fetch (default: 10s)
  job_index_per_job_timeout: 5s # Timeout per job for series fetch (default: 5s)
  job_index_workers: 10 # Number of concurrent workers for job processing (default: 10)
