apiVersion: apps/v1
kind: Deployment
metadata:
  name: perses-metrics-usage
  labels:
    app: perses-metrics-usage
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: perses-metrics-usage
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: perses-metrics-usage
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
      containers:
        - name: perses-metrics-usage
          image: persesdev/metrics-usage
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/opt/perses-metrics-usage/config/config.yaml
            - --log.method-trace
            # - --log.level=debug
          ports:
            - name: api
              containerPort: 8080
          resources:
            requests:
              cpu: 150m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: api
            initialDelaySeconds: 15
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/metrics
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 5
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - mountPath: /etc/opt/perses-metrics-usage/config
              name: config
      volumes:
        - name: config
          secret:
            secretName: perses-metrics-usage
      nodeSelector:
        kubernetes.io/os: linux
