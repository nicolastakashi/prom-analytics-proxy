services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: prom-analytics-proxy
      POSTGRES_USER: prom-analytics-proxy
      POSTGRES_PASSWORD: prom-analytics-proxy_dev
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - data:/var/lib/postgresql/data
    networks:
      - full-demo
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prom-analytics-proxy -d prom-analytics-proxy"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - full-demo
    restart: unless-stopped

  node:
    image: prom/node-exporter:latest
    command:
      - --collector.textfile.directory=/textfile_collector
    ports:
      - "9100:9100"
    networks:
      - full-demo
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./config/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - full-demo
    depends_on:
      - node
      - prom-analytics-proxy-ingester
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    command:
      - --web.listen-address=:9090
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-otlp-receiver
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../config/prometheus/rules.yml:/etc/prometheus/rules.yml
    ports:
      - "9090:9090"
    networks:
      - full-demo
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  prom-analytics-proxy:
    build:
      context: ../..
      dockerfile: Dockerfile.alpine
    image: prom-analytics-proxy:examples
    command:
      - --insecure-listen-address=0.0.0.0:9091
      - --upstream=http://prometheus:9090
      - --database-provider=postgresql
      - --postgresql-addr=postgres
      - --postgresql-port=5432
      - --postgresql-user=prom-analytics-proxy
      - --postgresql-password=prom-analytics-proxy_dev
      - --postgresql-database=prom-analytics-proxy
      - --postgresql-sslmode=disable
      - --inventory-enabled=true
      - --inventory-sync-interval=15s
    ports:
      - "9091:9091"
    networks:
      - full-demo
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      prometheus:
        condition: service_healthy

  prom-analytics-proxy-ingester:
    build:
      context: ../..
      dockerfile: Dockerfile.alpine
    image: prom-analytics-proxy:examples
    command:
      - ingester
      - --database-provider=postgresql
      - --postgresql-addr=postgres
      - --postgresql-port=5432
      - --postgresql-user=prom-analytics-proxy
      - --postgresql-password=prom-analytics-proxy_dev
      - --postgresql-database=prom-analytics-proxy
      - --postgresql-sslmode=disable
      - --otlp-listen-address=:4319
      - --otlp-downstream-address=otel-collector:4317
      - --ingester-metrics-listen-address=:4320
      - --ingester-dry-run=true
      - --ingester-catalog-sync-flush-interval=5s
      - --ingester-cache-enabled=true
      - --ingester-cache-addr=redis:6379
      - --ingester-catalog-sync-enabled=true
    ports:
      - "4320:4320"
    networks:
      - full-demo
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  perses:
    image: persesdev/perses:v0.53-distroless-debug
    command: "--config=/etc/perses/config/config.yaml"
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ../config/perses/config.yaml:/etc/perses/config/config.yaml
      - ./config/perses/datasource.yaml:/etc/perses/resources/datasource.yaml
      - ../config/perses/project.yaml:/etc/perses/resources/project.yaml
      - ../config/perses/dashboards:/etc/perses/resources/dashboard
    networks:
      - full-demo
    depends_on:
      prom-analytics-proxy:
        condition: service_started

  metrics-usage:
    image: persesdev/metrics-usage
    command: "--config=/app/config.yaml"
    ports:
      - "8081:8080"
    restart: unless-stopped
    depends_on:
      - perses
    volumes:
      - ./config/metrics-usage/config.yaml:/app/config.yaml
    networks:
      - full-demo

volumes:
  data:

networks:
  full-demo:
    driver: bridge
